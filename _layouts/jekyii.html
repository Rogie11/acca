<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <link rel="stylesheet" href="{{ 'assets/css/style.css' | relative_url }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;500;600;700&family=Zhi+Mang+Xing&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <div class="brand">
          <p class="brand-meta">亚特兰大现代中文学校</p>
          <h1>{{ site.title }}</h1>
          <p class="tagline">{{ site.description }}</p>
        </div>
        <nav class="site-nav">
          <ul>
            {% for item in site.data.navigation %}
            <li><a href="{{ item.url | relative_url }}">{{ item.title }}</a></li>
            {% endfor %}
          </ul>
        </nav>
      </div>
    </header>

    <main class="site-main">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div>
          <h2>联系管理团队</h2>
          <p>General Principal Lingyu Xu: <a href="mailto:[email protected]">[email protected]</a></p>
        </div>
        <div>
          <p>ACCA YouTube</p>
          <p>Copyright ©2026 亚特兰大现代中文学校 Atlanta Contemporary Chinese Academy (ACCA).</p>
        </div>
      </div>
    </footer>
  </body>
</html>
